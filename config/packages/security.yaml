security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        # used to reload user from session & other features (e.g. switch_user)
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            # Ensure dev tools and static assets are always allowed
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        api:
            pattern: ^/api
            stateless: true
            # Позволяет пропускать пустые запросы (без заголовка Authorization) дальше в access_control
            required_badges: []
            access_token:
                token_handler: App\Security\ApiTokenHandler

        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
                default_target_path: app_home
            logout:
                path: app_logout
                target: app_home
                # where to redirect after logout
                # target: app_any_route

            # Activate different ways to authenticate:
            # https://symfony.com/doc/current/security.html#the-firewall

            # https://symfony.com/doc/current/security/impersonating_user.html
            # switch_user: true

    # Note: Only the *first* matching rule is applied
    # Порядок правил имеет решающее значение!
    access_control:
        # 1. Открываем регистрацию без токена
        - { path: ^/api/register, roles: PUBLIC_ACCESS }

        # 2. Открываем логин без токена
        - { path: ^/api/login, roles: PUBLIC_ACCESS }

        # 3. ОТКРЫВАЕМ КАТЕГОРИИ И ВСЕ ИХ ПОДПУТИ ДЛЯ ВСЕХ (Чтение списков и конкретных ID)
        # Регулярка ($|/) корректно отработает и /api/categories, и /api/categories/3
        - { path: ^/api/categories($|/), methods: [GET], roles: PUBLIC_ACCESS }

        # 4. АДМИНИСТРИРОВАНИЕ КАТЕГОРИЙ (Аналог middleware 'can:manage-categories' из Laravel)
        - { path: ^/api/categories($|/), methods: [POST, PUT, PATCH, DELETE], roles: ROLE_ADMIN }

        # 5. СТРОГАЯ ЗАГЛУШКА: Все остальные пути внутри /api (включая /api/logout) требуют токен
        - { path: ^/api, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            # Password hashers are resource-intensive by design to ensure security.
            # In tests, it's safe to reduce their cost to improve performance.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
